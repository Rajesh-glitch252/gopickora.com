/* IMAGE ENHANCEMENT EFFECT */

.landscape.banner img,
.landscape.product img,
.saree-photo img{

</style>
</head>
<body>
<header class="top-header">
<div class="header-main">
<a aria-label="Associates deals" class="logo" href="#">Associates</a>
<form class="search" id="dealSearchForm">
<select aria-label="Category" id="searchCategory">
<option value="deals">Deals</option>
<option value="fashion">Fashion</option>
</select>
<input aria-label="Search" autocomplete="off" id="dealSearchInput" placeholder="Search fashion deals" type="search"/>
<button aria-label="Search" type="submit">⌕</button>
</form>
<details class="lang-menu">
<summary><span class="flag">🇮🇳</span> IN <span class="arrow">▾</span></summary>
<div class="lang-list">
        <a href="https://amzn.openinapp.co/1bl5b" target="_blank" rel="nofollow sponsored noopener">India / English</a>
        <a href="https://amzn.openinapp.co/keo53" target="_blank" rel="nofollow sponsored noopener">Hindi</a>
      </div>
</details>
</div>

<div class="page">
  <aside class="sidebar">
    <div class="filter-box">
      <h3>Quick Categories</h3>
      <a class="side-link" href="https://amzn.openinapp.co/8u4lt" target="_blank" rel="nofollow sponsored noopener">Today's Deals</a>
      <a class="side-link" href="https://amzn.openinapp.co/up31b" target="_blank" rel="nofollow sponsored noopener">Fashion Store</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="main-head">
      <h1>Top Trending Deals</h1>
      <p>Handpicked best deals for you</p>
    </div>

    <!-- UI CARDS GENERATE HONE KI JAGAH -->
    <div class="products" id="productsGrid"></div>
  </main>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="disclosure">
      <strong>Affiliate Disclosure:</strong> As an associate, we earn from qualifying purchases. Prices and availability are subject to change.
    </div>
  </div>
</footer>

<!-- 🚀 THE ULTIMATE UNIFIED RENDERER & SCHEMA SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    fetch('products.json')
        .then(response => {
            if (!response.ok) {
                throw new Error("HTTP error! status: " + response.status);
            }
            return response.json();
        })
        .then(products => {
            const productsGrid = document.getElementById('productsGrid');
            const schemaGraph = [];

            if (!productsGrid) return;
            productsGrid.innerHTML = ""; // Container clear karna

            products.forEach(p => {
                // ------ 1. VISUAL UI CARD RENDERING ENGINE ------
                // Saree products ke liye portrait ration select karna (.saree-photo)
                const isSaree = p.title && p.title.toLowerCase().includes('saree');
                const imageAreaClass = isSaree ? 'landscape saree-photo' : 'landscape product';

                // Badges rendering logic
                let badgesHtml = '';
                if (p.badges && Array.isArray(p.badges)) {
                    p.badges.forEach(b => {
                        const isOrange = b.toLowerCase().includes('off') || b.toLowerCase().includes('bazaar');
                        badgesHtml += `<span class="badge ${isOrange ? 'orange' : ''}">${b}</span>`;
                    });
                } else if (p.badge) {
                    badgesHtml += `<span class="badge">${p.badge}</span>`;
                }

                // Rating generation element
                let ratingHtml = '';
                if (p.rating) {
                    ratingHtml = `
                        <div class="rating">
                            ★ ${p.rating} <span>(${p.reviews || '100+'})</span>
                        </div>
                    `;
                }

                // MRP aur Discount pricing render logic
                let mrpHtml = '';
                if (p.mrp) mrpHtml = `<span class="mrp"><s>₹${p.mrp}</s></span>`;
                
                let saveHtml = '';
                if (p.save) saveHtml = `<span class="save">(${p.save})</span>`;

                // Single Unified Product Card UI Template
                const cardTemplate = `
                    <div class="product-card">
                        <a href="${p.link}" target="_blank" rel="nofollow sponsored noopener" class="product-media">
                            <div class="${imageAreaClass}">
                                <img src="${p.image}" alt="${p.title}" loading="lazy" />
                            </div>
                        </a>
                        <div class="product-info">
                            <div class="badges">${badgesHtml}</div>
                            <a href="${p.link}" target="_blank" rel="nofollow sponsored noopener">
                                <h4 class="product-title">${p.title}</h4>
                            </a>
                            ${ratingHtml}
                            <div class="price-line">
                                <span class="rupee">₹</span><span class="price">${p.price}</span>
                                ${mrpHtml}
                                ${saveHtml}
                            </div>
                            <a href="${p.link}" target="_blank" rel="nofollow sponsored noopener" class="shop-btn">
                                Shop Now
                            </a>
                        </div>
                    </div>
                `;
                
                // Card ko live grid ke andar push karna
                productsGrid.innerHTML += cardTemplate;

                // ------ 2. AUTOMATIC DYNAMIC GOOGLE SCHEMA ENGINE ------
                let cleanPrice = "0.00";
                if (p.price) {
                    cleanPrice = p.price.toString().replace(/[^0-9.]/g, '');
                }

                let finalRating = p.rating || "4.5";
                let finalReviews = p.reviews || "50";
                let currentBrand = (p.badges && p.badges.length > 0) ? p.badges[0] : "Associates Store";

                const singleProductSchema = {
                    "@type": "Product",
                    "name": p.title,
                    "image": [p.image],
                    "description": p.save || "Exclusive fashion pick on trending deal price.",
                    "brand": {
                        "@type": "Brand",
                        "name": currentBrand
                    },
                    "offers": {
                        "@type": "Offer",
                        "url": p.link,
                        "priceCurrency": "INR",
                        "price": cleanPrice,
                        "availability": "https://schema.org/InStock"
                    },
                    "aggregateRating": {
                        "@type": "AggregateRating",
                        "ratingValue": finalRating,
                        "reviewCount": finalReviews
                    }
                };

                schemaGraph.push(singleProductSchema);
            });

            // Head element ke andar global context graph schema load karna
            const fullSEOStructure = {
                "@context": "https://schema.org",
                "@graph": schemaGraph
            };

            const seoScriptTag = document.createElement('script');
            seoScriptTag.type = 'application/ld+json';
            seoScriptTag.text = JSON.stringify(fullSEOStructure, null, 2);
            document.head.appendChild(seoScriptTag);

            console.log("[🎯 Complete Success] UI Rendered and Google SEO Schema generated safely for " + products.length + " products!");
        })
        .catch(err => {
            console.error("[💥 Error] Sahi mapping ya loading me dikkat aayi hai: ", err);
        });
});
</script>
</body>
</html>
